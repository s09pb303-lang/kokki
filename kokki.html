<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイケル社会道場</title>
    <style>
        :root { --primary: #4CAF50; --secondary: #2196F3; --error: #F44336; --dojo-black: #1A1A1A; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #f8f8f8; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        .dojo-title { font-family: 'Kanteiryu', 'HG勘亭流', 'Yu Mincho', serif; font-weight: 900; color: var(--dojo-black); font-size: 56px; margin: 10px 0; text-align: center; line-height: 1.1; letter-spacing: -4px; transform: scaleY(1.1); padding: 10px; }
        .sub-title { font-family: sans-serif; font-size: 22px; font-weight: bold; color: #333; letter-spacing: 1px; display: block; margin-top: 5px; transform: scaleY(0.9); }
        
        #game-container { position: relative; width: 95%; max-width: 700px; background: white; margin-top: 5px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 50px 20px 20px 20px; text-align: center; display: none; }
        .home-back-btn { position: absolute; top: 15px; left: 15px; background: #eee; color: #666; border: none; padding: 5px 12px; font-size: 14px; border-radius: 5px; cursor: pointer; }
        
        #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px; }
        #timer { font-size: 28px; font-weight: bold; color: var(--error); background: #FFEBEE; padding: 4px 15px; border-radius: 50px; }
        #stats { font-size: 16px; font-weight: bold; color: #555; }
        
        /* 🌟 巨大国旗表示エリア */
        .flag-display { font-size: 180px; line-height: 1.2; margin: 10px auto 20px auto; display: flex; justify-content: center; align-items: center; min-height: 200px; filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.15)); }
        
        #choices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .choice-btn { background-color: var(--secondary); color: white; border: none; padding: 15px; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #1976D2; transition: transform 0.1s; }
        .choice-btn:active { transform: translateY(4px); box-shadow: none; }
        .choice-btn.wrong { background-color: #BDBDBD; box-shadow: 0 4px #9E9E9E; }
        
        #start-screen, #result-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .course-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .big-btn { padding: 20px 40px; font-size: 24px; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 50px; box-shadow: 0 6px #388E3C; cursor: pointer; }
        .big-btn:active { transform: translateY(6px); box-shadow: none; }
        
        #result-screen { display: none; padding: 20px; text-align: center; }
        .comment-box { background: #f0f7ff; padding: 20px; border-radius: 15px; margin: 20px 0; font-size: 20px; line-height: 1.6; color: #1a3a5a; border: 1px solid #d0e0f0; max-width: 550px; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 class="dojo-title">マイケル社会道場<br><span class="sub-title" id="app-subtitle">〜国旗あてゲーム編〜</span></h1>
        <p style="font-size: 20px; color: #666;">コースをえらんで修行開始！</p>
        <div class="course-btns">
            <button class="big-btn" onclick="startGame(1)">1分コース</button>
            <button class="big-btn" onclick="startGame(3)">3分コース</button>
            <button class="big-btn" onclick="startGame(5)">5分コース</button>
            <button class="big-btn" onclick="startGame(10)">10分コース</button>
        </div>
    </div>

    <div id="game-container">
        <button class="home-back-btn" onclick="if(confirm('修行を中断して、最初の画面にもどりますか？')) location.reload();">× やめる</button>
        <div id="header">
            <div id="stats">正解: <span id="correct-count">0</span> | ミス: <span id="incorrect-count">0</span></div>
            <div id="timer">--:--</div>
        </div>
        
        <div class="flag-display" id="flag-display">🏳️</div>
        
        <div id="choices-grid"></div>
        <div id="feedback" style="margin-top: 10px; height: 30px; font-size: 20px; font-weight: bold;"></div>
    </div>

    <div id="result-screen">
        <div style="font-size: 20px; color: #666; font-weight: bold;" id="display-course">--分コース</div>
        <div style="font-size: 48px; color: var(--dojo-black); font-weight: 900;">修行終了！</div>
        <div id="final-stats" style="font-size: 26px; font-weight: bold; margin: 15px 0;"></div>
        <div class="comment-box" id="result-comment"></div>
        <button class="big-btn" style="background: var(--secondary); box-shadow: 0 6px #1565C0;" onclick="location.reload()">もう一度 修行する</button>
    </div>

    <script>
        // 世界196カ国の完全データリスト
        const countries = [
            { name: 'アイスランド', code: 'IS' }, { name: 'アイルランド', code: 'IE' }, { name: 'アゼルバイジャン', code: 'AZ' }, { name: 'アフガニスタン', code: 'AF' },
            { name: 'アメリカ合衆国', code: 'US' }, { name: 'アラブ首長国連邦', code: 'AE' }, { name: 'アルジェリア', code: 'DZ' }, { name: 'アルゼンチン', code: 'AR' },
            { name: 'アルバニア', code: 'AL' }, { name: 'アルメニア', code: 'AM' }, { name: 'アンゴラ', code: 'AO' }, { name: 'アンティグア・バーブーダ', code: 'AG' },
            { name: 'アンドラ', code: 'AD' }, { name: 'イエメン', code: 'YE' }, { name: 'イギリス', code: 'GB' }, { name: 'イスラエル', code: 'IL' },
            { name: 'イタリア', code: 'IT' }, { name: 'イラク', code: 'IQ' }, { name: 'イラン', code: 'IR' }, { name: 'インド', code: 'IN' },
            { name: 'インドネシア', code: 'ID' }, { name: 'ウガンダ', code: 'UG' }, { name: 'ウクライナ', code: 'UA' }, { name: 'ウズベキスタン', code: 'UZ' },
            { name: 'ウルグアイ', code: 'UY' }, { name: 'エクアドル', code: 'EC' }, { name: 'エジプト', code: 'EG' }, { name: 'エストニア', code: 'EE' },
            { name: 'エスワティニ', code: 'SZ' }, { name: 'エチオピア', code: 'ET' }, { name: 'エリトリア', code: 'ER' }, { name: 'エルサルバドル', code: 'SV' },
            { name: 'オーストラリア', code: 'AU' }, { name: 'オーストリア', code: 'AT' }, { name: 'オマーン', code: 'OM' }, { name: 'オランダ', code: 'NL' },
            { name: 'ガーナ', code: 'GH' }, { name: 'カーボベルデ', code: 'CV' }, { name: 'ガイアナ', code: 'GY' }, { name: 'カザフスタン', code: 'KZ' },
            { name: 'カタール', code: 'QA' }, { name: 'カナダ', code: 'CA' }, { name: 'ガボン', code: 'GA' }, { name: 'カメルーン', code: 'CM' },
            { name: '韓国', code: 'KR' }, { name: 'ガンビア', code: 'GM' }, { name: 'カンボジア', code: 'KH' }, { name: '北マケドニア', code: 'MK' },
            { name: 'ギニア', code: 'GN' }, { name: 'ギニアビサウ', code: 'GW' }, { name: 'キプロス', code: 'CY' }, { name: 'キューバ', code: 'CU' },
            { name: 'ギリシャ', code: 'GR' }, { name: 'キリバス', code: 'KI' }, { name: 'キルギス', code: 'KG' }, { name: 'グアテマラ', code: 'GT' },
            { name: 'クウェート', code: 'KW' }, { name: 'グレナダ', code: 'GD' }, { name: 'クロアチア', code: 'HR' }, { name: 'ケニア', code: 'KE' },
            { name: 'コートジボワール', code: 'CI' }, { name: 'コスタリカ', code: 'CR' }, { name: 'コソボ', code: 'XK' }, { name: 'コモロ', code: 'KM' },
            { name: 'コロンビア', code: 'CO' }, { name: 'コンゴ共和国', code: 'CG' }, { name: 'コンゴ民主共和国', code: 'CD' }, { name: 'サウジアラビア', code: 'SA' },
            { name: 'サモア', code: 'WS' }, { name: 'サントメ・プリンシペ', code: 'ST' }, { name: 'ザンビア', code: 'ZM' }, { name: 'サンマリノ', code: 'SM' },
            { name: 'シエラレオネ', code: 'SL' }, { name: 'ジブチ', code: 'DJ' }, { name: 'ジャマイカ', code: 'JM' }, { name: 'ジョージア', code: 'GE' },
            { name: 'シリア', code: 'SY' }, { name: 'シンガポール', code: 'SG' }, { name: 'ジンバブエ', code: 'ZW' }, { name: 'スイス', code: 'CH' },
            { name: 'スウェーデン', code: 'SE' }, { name: 'スーダン', code: 'SD' }, { name: 'スペイン', code: 'ES' }, { name: 'スリナム', code: 'SR' },
            { name: 'スリランカ', code: 'LK' }, { name: 'スロバキア', code: 'SK' }, { name: 'スロベニア', code: 'SI' }, { name: 'セーシェル', code: 'SC' },
            { name: '赤道ギニア', code: 'GQ' }, { name: 'セネガル', code: 'SN' }, { name: 'セルビア', code: 'RS' }, { name: 'セントクリストファー・ネイビス', code: 'KN' },
            { name: 'セントビンセント・グレナディーン', code: 'VC' }, { name: 'セントルシア', code: 'LC' }, { name: 'ソマリア', code: 'SO' }, { name: 'ソロモン諸島', code: 'SB' },
            { name: 'タイ', code: 'TH' }, { name: 'タジキスタン', code: 'TJ' }, { name: 'タンザニア', code: 'TZ' }, { name: 'チェコ', code: 'CZ' },
            { name: 'チャド', code: 'TD' }, { name: '中央アフリカ', code: 'CF' }, { name: '中国', code: 'CN' }, { name: 'チュニジア', code: 'TN' },
            { name: '北朝鮮', code: 'KP' }, { name: 'チリ', code: 'CL' }, { name: 'ツバル', code: 'TV' }, { name: 'デンマーク', code: 'DK' },
            { name: 'ドイツ', code: 'DE' }, { name: 'トーゴ', code: 'TG' }, { name: 'ドミニカ共和国', code: 'DO' }, { name: 'ドミニカ国', code: 'DM' },
            { name: 'トリニダード・トバゴ', code: 'TT' }, { name: 'トルクメニスタン', code: 'TM' }, { name: 'トルコ', code: 'TR' }, { name: 'トンガ', code: 'TO' },
            { name: 'ナイジェリア', code: 'NG' }, { name: 'ナウル', code: 'NR' }, { name: 'ナミビア', code: 'NA' }, { name: 'ニカラグア', code: 'NI' },
            { name: 'ニジェール', code: 'NE' }, { name: '日本', code: 'JP' }, { name: 'ニュージーランド', code: 'NZ' }, { name: 'ネパール', code: 'NP' },
            { name: 'ノルウェー', code: 'NO' }, { name: 'バーレーン', code: 'BH' }, { name: 'ハイチ', code: 'HT' }, { name: 'パキスタン', code: 'PK' },
            { name: 'バチカン', code: 'VA' }, { name: 'パナマ', code: 'PA' }, { name: 'バヌアツ', code: 'VU' }, { name: 'バハマ', code: 'BS' },
            { name: 'パプアニューギニア', code: 'PG' }, { name: 'パラオ', code: 'PW' }, { name: 'パラグアイ', code: 'PY' }, { name: 'バルバドス', code: 'BB' },
            { name: 'パレスチナ', code: 'PS' }, { name: 'ハンガリー', code: 'HU' }, { name: 'バングラデシュ', code: 'BD' }, { name: 'フィジー', code: 'FJ' },
            { name: 'フィリピン', code: 'PH' }, { name: 'フィンランド', code: 'FI' }, { name: 'ブータン', code: 'BT' }, { name: 'ブラジル', code: 'BR' },
            { name: 'フランス', code: 'FR' }, { name: 'ブルガリア', code: 'BG' }, { name: 'ブルキナファソ', code: 'BF' }, { name: 'ブルネイ', code: 'BN' },
            { name: 'ブルンジ', code: 'BI' }, { name: 'ベトナム', code: 'VN' }, { name: 'ベナン', code: 'BJ' }, { name: 'ベネズエラ', code: 'VE' },
            { name: 'ベラルーシ', code: 'BY' }, { name: 'ベリーズ', code: 'BZ' }, { name: 'ペルー', code: 'PE' }, { name: 'ベルギー', code: 'BE' },
            { name: 'ポーランド', code: 'PL' }, { name: 'ボスニア・ヘルツェゴビナ', code: 'BA' }, { name: 'ボツワナ', code: 'BW' }, { name: 'ボリビア', code: 'BO' },
            { name: 'ポルトガル', code: 'PT' }, { name: 'ホンジュラス', code: 'HN' }, { name: 'マーシャル諸島', code: 'MH' }, { name: 'マダガスカル', code: 'MG' },
            { name: 'マラウイ', code: 'MW' }, { name: 'マリ', code: 'ML' }, { name: 'マルタ', code: 'MT' }, { name: 'マレーシア', code: 'MY' },
            { name: 'ミクロネシア', code: 'FM' }, { name: '南アフリカ', code: 'ZA' }, { name: '南スーダン', code: 'SS' }, { name: 'ミャンマー', code: 'MM' },
            { name: 'メキシコ', code: 'MX' }, { name: 'モーリシャス', code: 'MU' }, { name: 'モーリタニア', code: 'MR' }, { name: 'モザンビーク', code: 'MZ' },
            { name: 'モナコ', code: 'MC' }, { name: 'モルディブ', code: 'MV' }, { name: 'モルドバ', code: 'MD' }, { name: 'モロッコ', code: 'MA' },
            { name: 'モンゴル', code: 'MN' }, { name: 'モンテネグロ', code: 'ME' }, { name: 'ヨルダン', code: 'JO' }, { name: 'ラオス', code: 'LA' },
            { name: 'ラトビア', code: 'LV' }, { name: 'リトアニア', code: 'LT' }, { name: 'リビア', code: 'LY' }, { name: 'リヒテンシュタイン', code: 'LI' },
            { name: 'リベリア', code: 'LR' }, { name: 'ルーマニア', code: 'RO' }, { name: 'ルクセンブルク', code: 'LU' }, { name: 'ルワンダ', code: 'RW' },
            { name: 'レソト', code: 'LS' }, { name: 'レバノン', code: 'LB' }, { name: 'ロシア', code: 'RU' }
        ];

        let timeLeft = 0;
        let initialTime = 0;
        let score = 0;
        let mistakes = 0;
        let currentCorrectCountry = null;
        let gameActive = false;
        let timerId = null;
        let audioCtx = null;
        let courseName = "";

        // 音響システム（算数道場からそのまま継承）
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playClappers() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [0, 0.6].forEach(time => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, now + time);
                osc.frequency.exponentialRampToValueAtTime(800, now + time + 0.05);
                gain.gain.setValueAtTime(0, now + time);
                gain.gain.linearRampToValueAtTime(0.3, now + time + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, now + time + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + time);
                osc.stop(now + time + 0.15);
            });
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function getFlagEmoji(countryCode) {
            return countryCode.toUpperCase().replace(/./g, char => String.fromCodePoint(char.charCodeAt(0) + 127397));
        }

        function generateProblem() {
            const grid = document.getElementById('choices-grid');
            grid.innerHTML = '';

            // ランダムに4カ国を選ぶ
            const shuffled = [...countries].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 4);
            currentCorrectCountry = selected[Math.floor(Math.random() * 4)];

            // 巨大国旗をセット
            document.getElementById('flag-display').textContent = getFlagEmoji(currentCorrectCountry.code);

            // 選択肢ボタンを生成
            selected.forEach(country => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = country.name;
                btn.onclick = () => checkAnswer(country, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selectedCountry, btn) {
            if (!gameActive || btn.classList.contains('wrong')) return;

            if (selectedCountry.code === currentCorrectCountry.code) {
                // 正解の処理
                score++;
                playTone(660, 'sine', 0.1, 0.1); setTimeout(() => playTone(880, 'sine', 0.2, 0.1), 80);
                document.getElementById('correct-count').textContent = score;
                // 🌟 ここを「からあげ」に修正しました！
                document.getElementById('feedback').textContent = "ナイス！からあげあげる！";
                document.getElementById('feedback').style.color = "green";
                
                // 次の問題へ
                setTimeout(() => {
                    generateProblem();
                    document.getElementById('feedback').textContent = "";
                }, 400);

            } else {
                // 不正解の処理
                mistakes++;
                playTone(150, 'sawtooth', 0.3, 0.1);
                document.getElementById('incorrect-count').textContent = mistakes;
                // 🌟 ここを「気合い」に修正しました！
                document.getElementById('feedback').textContent = "がんばれ！気合いじゃ！";
                document.getElementById('feedback').style.color = "red";
                btn.classList.add('wrong');
            }
        }

        function startGame(mins) {
            initAudio();
            courseName = mins + "分コース";
            initialTime = mins * 60;
            timeLeft = initialTime;
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            gameActive = true;
            score = 0; mistakes = 0;
            document.getElementById('correct-count').textContent = "0";
            document.getElementById('incorrect-count').textContent = "0";
            document.getElementById('feedback').textContent = "";
            
            generateProblem();
            
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerId);
            playClappers(); 
            
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('display-course').textContent = courseName;
            document.getElementById('final-stats').textContent = `正解: ${score}問 / ミス: ${mistakes}回`;
            
            let comment = "";
            if (score >= 40) comment = "【世界一周マスター】<br>すばらしい！世界中の国旗を知り尽くしているね。きみは真の国旗博士だ！";
            else if (score >= 20) comment = "【グローバルリーダー】<br>すごい速さで答えられたね！もっと色んな国を調べてみよう！";
            else if (score >= 10) comment = "【世界への旅人】<br>色んな国旗を覚えられてきたね。その調子だよ！";
            else comment = "【ナイスチャレンジ！】<br>修行おつかれさま！毎日少しずつ練習して、色んな国の名前と国旗を覚えよう！";
            
            document.getElementById('result-comment').innerHTML = comment;
        }
    </script>
</body>
</html>
